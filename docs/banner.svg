<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320" role="img" aria-label="rewind — Record. Scrub. Replay every LLM call.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e1f"/>
      <stop offset="100%" stop-color="#060a18"/>
    </linearGradient>
    <linearGradient id="namegrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f5d0fe"/>
      <stop offset="50%" stop-color="#f0abfc"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="flow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0abfc" stop-opacity="0.0"/>
      <stop offset="50%" stop-color="#f0abfc" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="trackgrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0abfc" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.85"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#1f2937" stroke-width="0.5" opacity="0.5"/>
    </pattern>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#f0abfc" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#f0abfc" stop-opacity="0"/>
    </radialGradient>
    <filter id="neon" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1280" height="320" fill="url(#bg)"/>
  <rect width="1280" height="320" fill="url(#grid)"/>
  <ellipse cx="970" cy="160" rx="380" ry="220" fill="url(#glow)"/>

  <!-- LEFT -->
  <g font-family="ui-sans-serif, -apple-system, 'Segoe UI', Inter, system-ui, sans-serif">
    <g transform="translate(60, 80)">
      <rect width="64" height="64" rx="12" fill="none" stroke="#f0abfc" stroke-opacity="0.6" stroke-width="2"/>
      <!-- rewind glyph: two left-pointing triangles -->
      <g transform="translate(32, 32)">
        <polygon points="-4,-12 -4,12 -20,0" fill="#f0abfc"/>
        <polygon points="14,-12 14,12 -2,0" fill="#22d3ee"/>
      </g>
      <path d="M 0 8 L 0 0 L 8 0" fill="none" stroke="#22d3ee" stroke-width="2"/>
      <path d="M 56 0 L 64 0 L 64 8" fill="none" stroke="#22d3ee" stroke-width="2"/>
      <path d="M 64 56 L 64 64 L 56 64" fill="none" stroke="#22d3ee" stroke-width="2"/>
      <path d="M 8 64 L 0 64 L 0 56" fill="none" stroke="#22d3ee" stroke-width="2"/>
    </g>

    <text x="148" y="118" font-family="ui-monospace, Consolas, monospace" font-size="11" fill="#64748b" letter-spacing="2.5">~/rewind $ rewind scrub last</text>

    <text x="60" y="180" font-size="68" font-weight="800" fill="url(#namegrad)" letter-spacing="-2.5" filter="url(#neon)">
      rewind
    </text>

    <text x="60" y="216" font-size="18" font-weight="500" fill="#cbd5e1" letter-spacing="0.3">
      Record. Scrub. Replay every LLM call. Local-first, single SQLite file.
    </text>

    <g transform="translate(60, 240)" font-family="ui-monospace, Consolas, monospace">
      <g><rect width="68" height="28" rx="14" fill="#0f172a" stroke="#f0abfc" stroke-opacity="0.55"/><text x="34" y="19" font-size="11" font-weight="700" fill="#f0abfc" text-anchor="middle">RECORD</text></g>
      <g transform="translate(80, 0)"><rect width="60" height="28" rx="14" fill="#0f172a" stroke="#22d3ee" stroke-opacity="0.55"/><text x="30" y="19" font-size="11" font-weight="700" fill="#22d3ee" text-anchor="middle">SCRUB</text></g>
      <g transform="translate(152, 0)"><rect width="60" height="28" rx="14" fill="#0f172a" stroke="#a78bfa" stroke-opacity="0.55"/><text x="30" y="19" font-size="11" font-weight="700" fill="#a78bfa" text-anchor="middle">REPLAY</text></g>
      <g transform="translate(224, 0)"><rect width="48" height="28" rx="14" fill="#0f172a" stroke="#fbbf24" stroke-opacity="0.55"/><text x="24" y="19" font-size="11" font-weight="700" fill="#fbbf24" text-anchor="middle">COST</text></g>
      <g transform="translate(284, 0)"><rect width="56" height="28" rx="14" fill="#0f172a" stroke="#34d399" stroke-opacity="0.55"/><text x="28" y="19" font-size="11" font-weight="700" fill="#34d399" text-anchor="middle">TRACE</text></g>
    </g>

    <text x="60" y="304" font-family="ui-monospace, Consolas, monospace" font-size="10" fill="#475569" letter-spacing="2.4">
      MIT  ·  SQLITE  ·  ANTHROPIC · OPENAI · OLLAMA  ·  TOKEN-PERFECT REPLAY
    </text>
  </g>

  <!-- RIGHT: scrub timeline + frame panel -->
  <g transform="translate(700, 50)">
    <rect x="0" y="0" width="540" height="240" rx="10" fill="#070a14" stroke="#1e293b"/>
    <rect x="0" y="0" width="540" height="26" rx="10" fill="#0f172a"/>
    <rect x="0" y="18" width="540" height="8" fill="#0f172a"/>
    <g font-family="ui-monospace, Consolas, monospace" font-size="10">
      <circle cx="14" cy="13" r="3.5" fill="#ef4444"/>
      <circle cx="26" cy="13" r="3.5" fill="#fbbf24"/>
      <circle cx="38" cy="13" r="3.5" fill="#22d3ee"/>
      <text x="56" y="17" fill="#64748b">trace.scrub()</text>
      <rect x="430" y="5" width="100" height="16" rx="8" fill="#1a0a1f" stroke="#f0abfc" stroke-opacity="0.55"/>
      <text x="480" y="16" fill="#f0abfc" text-anchor="middle">REC ON</text>
    </g>

    <!-- TIMELINE -->
    <g transform="translate(20, 56)">
      <text x="0" y="-2" font-family="ui-monospace, Consolas, monospace" font-size="8" fill="#64748b" letter-spacing="1.5">TIMELINE // 24 calls</text>
      <!-- track -->
      <rect x="0" y="14" width="500" height="6" rx="3" fill="#0f172a" stroke="#1e293b"/>
      <rect x="0" y="14" width="500" height="6" rx="3" fill="url(#trackgrad)" opacity="0.35"/>
      <!-- ticks for LLM calls -->
      <g fill="#94a3b8">
        <rect x="22" y="9" width="2" height="16" rx="1" opacity="0.7"/>
        <rect x="58" y="9" width="2" height="16" rx="1" opacity="0.7"/>
        <rect x="92" y="9" width="2" height="16" rx="1" opacity="0.7"/>
        <rect x="124" y="9" width="2" height="16" rx="1" opacity="0.7"/>
        <rect x="160" y="9" width="2" height="16" rx="1" opacity="0.7"/>
        <rect x="196" y="9" width="2" height="16" rx="1" opacity="0.7"/>
        <rect x="232" y="9" width="2" height="16" rx="1" opacity="0.7"/>
        <rect x="268" y="9" width="2" height="16" rx="1" opacity="0.7"/>
        <rect x="304" y="9" width="2" height="16" rx="1" opacity="0.7"/>
        <rect x="338" y="9" width="2" height="16" rx="1" opacity="0.7"/>
        <rect x="372" y="9" width="2" height="16" rx="1" opacity="0.7"/>
        <rect x="406" y="9" width="2" height="16" rx="1" opacity="0.7"/>
        <rect x="438" y="9" width="2" height="16" rx="1" opacity="0.7"/>
        <rect x="472" y="9" width="2" height="16" rx="1" opacity="0.7"/>
      </g>
      <!-- moving playhead -->
      <g>
        <rect x="-5" y="2" width="10" height="30" rx="2" fill="#f0abfc" opacity="0.95">
          <animate attributeName="x" values="-5;255;495;-5" keyTimes="0;0.5;0.95;1" dur="4s" repeatCount="indefinite"/>
        </rect>
        <circle cx="0" cy="17" r="6" fill="#22d3ee" stroke="#0a0e1f" stroke-width="2">
          <animate attributeName="cx" values="0;260;500;0" keyTimes="0;0.5;0.95;1" dur="4s" repeatCount="indefinite"/>
        </circle>
      </g>
      <text x="0" y="50" font-family="ui-monospace, Consolas, monospace" font-size="8" fill="#64748b">t=0</text>
      <text x="500" y="50" font-family="ui-monospace, Consolas, monospace" font-size="8" fill="#64748b" text-anchor="end">t=12.4s</text>
    </g>

    <!-- FRAME PANEL (call N of M) -->
    <g transform="translate(20, 122)" font-family="ui-monospace, Consolas, monospace">
      <rect width="220" height="74" rx="6" fill="#0a0e1f" stroke="#f0abfc" stroke-opacity="0.65"/>
      <text x="12" y="16" font-size="8" fill="#64748b" letter-spacing="1.5">FRAME</text>
      <text x="208" y="16" font-size="8" fill="#64748b" text-anchor="end" letter-spacing="1.5">14 / 24</text>
      <text x="12" y="36" font-size="11" fill="#f0abfc" font-weight="700">tools.search("policy")</text>
      <text x="12" y="52" font-size="9" fill="#94a3b8">prompt 1.2k tok · output 384 tok</text>
      <text x="12" y="66" font-size="9" fill="#22d3ee">latency 842ms</text>
    </g>

    <!-- COST counter -->
    <g transform="translate(252, 122)" font-family="ui-monospace, Consolas, monospace">
      <rect width="120" height="74" rx="6" fill="#0a0e1f" stroke="#fbbf24" stroke-opacity="0.65"/>
      <text x="12" y="16" font-size="8" fill="#64748b" letter-spacing="1.5">COST</text>
      <text x="60" y="46" font-size="22" font-weight="800" fill="#fbbf24" text-anchor="middle">$0.0042</text>
      <text x="60" y="64" font-size="9" fill="#94a3b8" text-anchor="middle">cumulative</text>
    </g>

    <!-- MODEL SWAP A -> B -->
    <g transform="translate(384, 122)" font-family="ui-monospace, Consolas, monospace">
      <rect width="136" height="74" rx="6" fill="#0a0e1f" stroke="#22d3ee" stroke-opacity="0.65"/>
      <text x="12" y="16" font-size="8" fill="#64748b" letter-spacing="1.5">REPLAY MODEL</text>
      <g transform="translate(12, 30)">
        <rect width="44" height="20" rx="4" fill="#1a0a1f" stroke="#f0abfc" stroke-opacity="0.6"/>
        <text x="22" y="14" font-size="9" fill="#f0abfc" text-anchor="middle" font-weight="700">opus</text>
      </g>
      <g fill="none" stroke="#22d3ee" stroke-width="1.5">
        <path d="M 60 40 L 76 40" stroke-linecap="round"/>
        <polygon points="76,36 84,40 76,44" fill="#22d3ee"/>
      </g>
      <g transform="translate(86, 30)">
        <rect width="44" height="20" rx="4" fill="#1a0a1f" stroke="#22d3ee" stroke-opacity="0.6"/>
        <text x="22" y="14" font-size="9" fill="#22d3ee" text-anchor="middle" font-weight="700">haiku</text>
      </g>
      <text x="68" y="66" font-size="9" fill="#94a3b8" text-anchor="middle">swap @ frame 14</text>
    </g>

    <!-- TOKEN BARS at bottom -->
    <g transform="translate(20, 210)" font-family="ui-monospace, Consolas, monospace">
      <text x="0" y="-2" font-size="8" fill="#64748b" letter-spacing="1.5">TOKENS // per call</text>
      <g fill="#22d3ee">
        <rect x="0" y="6" width="14" height="8" rx="1" opacity="0.85"/>
        <rect x="20" y="2" width="14" height="12" rx="1" opacity="0.7"/>
        <rect x="40" y="6" width="14" height="8" rx="1" opacity="0.85"/>
        <rect x="60" y="0" width="14" height="14" rx="1" opacity="0.6"/>
        <rect x="80" y="4" width="14" height="10" rx="1" opacity="0.8"/>
        <rect x="100" y="2" width="14" height="12" rx="1" opacity="0.7"/>
        <rect x="120" y="6" width="14" height="8" rx="1" opacity="0.85"/>
        <rect x="140" y="-2" width="14" height="16" rx="1" opacity="0.65"/>
        <rect x="160" y="4" width="14" height="10" rx="1" opacity="0.85"/>
        <rect x="180" y="2" width="14" height="12" rx="1" opacity="0.7"/>
        <rect x="200" y="6" width="14" height="8" rx="1" opacity="0.8"/>
        <rect x="220" y="0" width="14" height="14" rx="1" opacity="0.6"/>
        <rect x="240" y="4" width="14" height="10" rx="1" opacity="0.85"/>
        <rect x="260" y="2" width="14" height="12" rx="1" opacity="0.7"/>
        <rect x="280" y="6" width="14" height="8" rx="1" opacity="0.85"/>
        <rect x="300" y="-2" width="14" height="16" rx="1" opacity="0.65"/>
        <rect x="320" y="4" width="14" height="10" rx="1" opacity="0.8"/>
        <rect x="340" y="2" width="14" height="12" rx="1" opacity="0.7"/>
        <rect x="360" y="6" width="14" height="8" rx="1" opacity="0.85"/>
        <rect x="380" y="0" width="14" height="14" rx="1" opacity="0.6"/>
        <rect x="400" y="4" width="14" height="10" rx="1" opacity="0.85"/>
        <rect x="420" y="2" width="14" height="12" rx="1" opacity="0.7"/>
        <rect x="440" y="6" width="14" height="8" rx="1" opacity="0.85"/>
        <rect x="460" y="-2" width="14" height="16" rx="1" opacity="0.65"/>
      </g>
    </g>
  </g>

  <rect x="0" y="318" width="1280" height="2" fill="#f0abfc" opacity="0.55"/>
</svg>
